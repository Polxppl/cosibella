services:
  db:
    image: postgres:18
    container_name: cosibella_postgres_db
    environment:
      POSTGRES_USER: ${DB_ROOT_USER}
      POSTGRES_PASSWORD: ${DB_ROOT_PASSWORD}

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/cosibella/data
      - ./scripts/database:/docker-entrypoint-initdb.d
      - ./src/migrations:/migrations

volumes:
  pgdata:
